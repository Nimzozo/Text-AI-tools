<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text-ai-tools</title>
    <meta name="description" content="Lightweight tools for AI writing worflows—powered by Pollinations." />
    <meta name="keywords" content="AI, text, tools, pollinations, explain, format, improve, translate" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:title" content="text-ai-tools" />
    <meta property="og:description" content="Explain, format, improve, and translate text with AI — right in your browser." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nimzozo.github.io/text-ai-tools/" />
    <meta property="og:image" content="https://nimzozo.github.io/text-ai-tools/favicon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="text-ai-tools" />
    <meta name="twitter:description" content="Explain, format, improve, and translate text with AI — right in your browser." />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app-shell">
      <main class="main-grid">
        <section class="card app-card">
          <div id="app-header">
            <a id="app-link" href="#">
              <img id="app-logo" src="assets/quill-pen.png" alt="app logo">
              <h1>Text-ai-tools</h1>
            </a>
            <a id="github-link" href="https://github.com/Nimzozo/text-ai-tools">
              <img id="github-logo" src="assets/github-64.png" alt="github">  
            </a>
          </div>
          <div class="card-footer">
            Lightweight tools for AI writing workflows—powered by Pollinations.
          </div>
        </section>

        <section class="card auth-card">
          <div id="auth-form">
            <div id="auth-header">
              <h2>Have a Pollinations account?</h2>
              <p>Enter your API key to access powerful AI tools.</p>
            </div>

            <div id="api-key-form">
              <div class="input-with-toggle">
                <input id="api-key-input" type="password" placeholder="sk_xxx" autocomplete="on" />
                <button id="reveal-key-button" aria-label="Reveal API key">
                  <img id="eye-image" src="assets/eye.png" alt="eye">
                </button>
              </div>
              <button id="login-button" class="button primary-button">Log in</button>
            </div>

            <div class="divider"><span>or continue with</span></div>
            <button id="auth-button" class="button secondary-button">
              <img id="auth-logo" src="assets/pollinations-logo.svg" alt="Pollinations logo">Pollinations
            </button>
            <p class="auth-footnote">Your key is stored in your browser's local storage only.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
